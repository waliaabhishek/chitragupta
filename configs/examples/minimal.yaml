# Minimal Confluent Cloud config
# Requires: CCLOUD_ORG_ID, CCLOUD_API_KEY, CCLOUD_API_SECRET

tenants:
  my-org:
    ecosystem: confluent_cloud
    tenant_id: "${CCLOUD_ORG_ID}"
    storage:
      connection_string: "sqlite:///data/my-org.db"
    plugin_settings:
      ccloud_api:
        key: "${CCLOUD_API_KEY}"
        secret: "${CCLOUD_API_SECRET}"
