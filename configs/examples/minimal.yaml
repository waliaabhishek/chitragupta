# Minimal Confluent Cloud config
# Requires: CCLOUD_TENANT_ID, CCLOUD_API_KEY, CCLOUD_API_SECRET

tenants:
  my-org:
    ecosystem: confluent_cloud
    tenant_id: "${CCLOUD_TENANT_ID}"  # unique partition key (any string, not the CCloud org ID)
    storage:
      connection_string: "sqlite:///data/my-org.db"
    plugin_settings:
      ccloud_api:
        key: "${CCLOUD_API_KEY}"
        secret: "${CCLOUD_API_SECRET}"
