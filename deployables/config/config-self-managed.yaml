logging:
  level: INFO

features:
  enable_periodic_refresh: true
  refresh_interval: 900

api:
  host: "0.0.0.0"
  port: 8080

tenants:
  kafka-dc1:
    ecosystem: self_managed_kafka
    tenant_id: kafka-dc1
    lookback_days: 30
    cutoff_days: 3
    storage:
      backend: sqlmodel
      connection_string: "sqlite:////app/data/chargeback.db"
    plugin_settings:
      cost_model: constructed
      bootstrap_servers: "${KAFKA_BOOTSTRAP_SERVERS}"
      monthly_infrastructure_cost: 15000.00
      metrics_source: prometheus
      prometheus_url: "${PROMETHEUS_URL}"
      identity_source: prometheus
