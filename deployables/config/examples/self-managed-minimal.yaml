# =============================================================================
# Self-Managed Kafka Minimal — Single cluster, Prometheus identity discovery.
# Who: On-prem/bare-metal/BYOC Kafka operators with Prometheus JMX exporter.
# Requires env vars: PROMETHEUS_URL
# =============================================================================

logging:
  level: ${LOG_LEVEL:-INFO}

features:
  enable_periodic_refresh: true
  refresh_interval: 1800

api:
  host: "0.0.0.0"
  port: 8080

tenants:
  kafka-dc1:
    ecosystem: self_managed_kafka  # Required — must be "self_managed_kafka"
    tenant_id: kafka-dc1           # Required — arbitrary unique tenant key
    lookback_days: 30              # Optional — backfill window; 1-364; must be > cutoff_days
    cutoff_days: 3                 # Optional — billing finalization lag; 1-30

    storage:
      backend: sqlmodel
      connection_string: "sqlite:////app/data/kafka-dc1.db"  # Required — unique per tenant

    plugin_settings:
      cluster_id: kafka-dc1      # Required — used as resource_id in all billing lines
      broker_count: 3            # Required — number of brokers; >0; used in compute cost calculation

      # --- Cost model (required) ---
      # All rates are in USD. Use quoted strings to preserve Decimal precision.
      cost_model:
        compute_hourly_rate: "0.50"          # Required — USD per broker-hour
        storage_per_gib_hourly: "0.000125"   # Required — USD per GiB-hour (1 GiB = 2^30 bytes)
        network_ingress_per_gib: "0.01"      # Required — USD per GiB ingested
        network_egress_per_gib: "0.09"       # Required — USD per GiB egressed

      # --- Prometheus connection (required) ---
      metrics:
        type: prometheus          # Optional — only "prometheus" supported
        url: "${PROMETHEUS_URL}"  # Required — Prometheus base URL
        auth_type: none           # Optional — "none"/"basic"/"bearer"

      # --- Identity source (optional) ---
      identity_source:
        source: prometheus        # Optional — "prometheus"/"static"/"both"; default "prometheus"
        default_team: UNASSIGNED  # Optional — team label for principals with no mapping
