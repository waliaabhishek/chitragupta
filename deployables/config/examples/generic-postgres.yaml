# =============================================================================
# Generic Metrics-Only: PostgreSQL
# Who: Teams running self-managed PostgreSQL wanting chargeback by database/team.
# ecosystem: generic_metrics_only — cost model fully defined in YAML.
# Note: Uses postgres_exporter metrics. discovery_query must return rows with
#       the label specified in identity_source.label.
# Requires env vars: PROMETHEUS_URL
# =============================================================================

logging:
  level: ${LOG_LEVEL:-INFO}

features:
  enable_periodic_refresh: true
  refresh_interval: 1800

api:
  host: "0.0.0.0"
  port: 8080

tenants:
  postgres-prod:
    ecosystem: generic_metrics_only  # Required — must be "generic_metrics_only"
    tenant_id: postgres-prod          # Required — arbitrary unique tenant key

    storage:
      backend: sqlmodel
      connection_string: "sqlite:////app/data/postgres-prod.db"

    plugin_settings:
      ecosystem_name: self_managed_postgres  # Required — used as ecosystem label in all billing lines
      cluster_id: postgres-prod-cluster      # Required — resource_id for this cluster in billing
      display_name: "Production PostgreSQL"  # Optional — human-readable label

      # --- Prometheus connection (required) ---
      metrics:
        type: prometheus
        url: "${PROMETHEUS_URL}"  # Required
        auth_type: none           # Optional

      # --- Identity discovery ---
      identity_source:
        source: prometheus           # Optional — "prometheus"/"static"/"both"; default "prometheus"
        label: datname               # Optional — Prometheus label used as identity_id; default "principal"
        # Required when source includes "prometheus" — PromQL whose result rows contain the `label`
        discovery_query: "pg_stat_database_numbackends{datname!~'template.*|postgres'}"
        default_team: UNASSIGNED     # Optional
        # Optional — map database names to owning teams
        principal_to_team:
          orders_db: team-commerce
          analytics_db: team-data-eng

      # --- Cost types (at least 1 required) ---
      cost_types:
        # Compute: fixed instance count × hourly rate, split evenly across databases
        - name: PG_COMPUTE                   # Required — product_type in billing lines
          product_category: postgres          # Required — product_category label
          rate: "0.15"                        # Required — USD per unit; quoted string for Decimal precision
          cost_quantity:
            type: fixed                       # Required — "fixed"/"storage_gib"/"network_gib"
            count: 2                          # Required (type=fixed) — instance/replica count
          allocation_strategy: even_split     # Required — "even_split"/"usage_ratio"

        # Storage: measured GiB-hours from Prometheus, split evenly
        - name: PG_STORAGE
          product_category: postgres
          rate: "0.10"                        # USD per GiB-hour
          cost_quantity:
            type: storage_gib                 # Queries Prometheus for average bytes → GiB-hours
            # Required (type=storage_gib) — cluster-wide PromQL; no {} placeholder
            query: "sum(pg_database_size_bytes) / 1073741824"
          allocation_strategy: even_split

        # Connections: allocated by actual connection count per database (usage_ratio)
        - name: PG_CONNECTIONS
          product_category: postgres
          rate: "0.001"                       # USD per connection (multiplied by connection count)
          cost_quantity:
            type: fixed
            count: 1                          # Multiplier — rate is applied per-connection
          allocation_strategy: usage_ratio    # Allocates proportionally to actual usage
          # Required when allocation_strategy=usage_ratio:
          allocation_query: "pg_stat_database_numbackends{datname!~'template.*|postgres'}"
          allocation_label: datname           # Required — label in allocation_query rows identifying the identity

      # --- Orchestration ---
      chargeback_granularity: daily       # Optional — "hourly"/"daily"/"monthly"; default "daily"
      min_refresh_gap_seconds: 1800       # Optional — minimum seconds between runs; >=0; 0=no minimum
      metrics_step_seconds: 3600          # Optional — Prometheus step in seconds; >0; lower=finer data + higher load

      # Optional — allocator-specific numeric/string/bool params passed to all allocators.
      # Keys and semantics are allocator-defined.
      # allocator_params:
      #   min_connections_threshold: 5      # databases with fewer connections excluded from usage ratio
      #   weight_storage_by_size: true      # boolean param; interpretation is allocator-specific
      allocator_params: {}

      # Optional — override the allocator for specific product types.
      # Maps product_type (cost_types[].name) → Python dotted path to a CostAllocator callable.
      # Valid product types for this config: PG_COMPUTE, PG_STORAGE, PG_CONNECTIONS
      # allocator_overrides:
      #   PG_STORAGE: "my_org.allocators.StorageSizeWeightedAllocator"
      #   PG_CONNECTIONS: "my_org.allocators.ConnectionWeightedAllocator"
      allocator_overrides: {}

      # Optional — override the identity resolver for a service type.
      # Maps service_type → Python dotted path to a resolver function.
      # Valid service_type for generic_metrics_only: "generic"
      # identity_resolution_overrides:
      #   generic: "my_org.resolvers.db_team_registry_resolver"
      identity_resolution_overrides: {}
