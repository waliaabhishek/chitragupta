# =============================================================================
# Generic Metrics-Only: Redis
# Who: Teams running self-managed Redis needing memory/compute-based chargeback.
# ecosystem: generic_metrics_only — cost model defined in YAML.
# Note: Uses redis_exporter metrics. source=static because Redis metrics
#       do not expose per-client identity labels suitable for discovery.
# Requires env vars: PROMETHEUS_URL
# =============================================================================

logging:
  level: ${LOG_LEVEL:-INFO}

features:
  enable_periodic_refresh: true
  refresh_interval: 1800

api:
  host: "0.0.0.0"
  port: 8080

tenants:
  redis-prod:
    ecosystem: generic_metrics_only  # Required — must be "generic_metrics_only"
    tenant_id: redis-prod             # Required — arbitrary unique tenant key

    storage:
      backend: sqlmodel
      connection_string: "sqlite:////app/data/redis-prod.db"

    plugin_settings:
      ecosystem_name: self_managed_redis    # Required — billing ecosystem label
      cluster_id: redis-prod-cluster        # Required — resource_id in billing
      display_name: "Production Redis"      # Optional

      metrics:
        type: prometheus
        url: "${PROMETHEUS_URL}"
        auth_type: none

      # --- Identity source ---
      # source=static because Redis does not expose per-client labels in standard metrics.
      # discovery_query is NOT required when source="static".
      identity_source:
        source: static              # Optional — "prometheus"/"static"/"both"
        default_team: UNASSIGNED    # Optional
        static_identities:          # Required when source=static — at least one identity
          - identity_id: team-backend   # Required — identity ID used in billing output
            identity_type: team         # Required — "principal"/"team"/"service_account"
            display_name: Backend Team  # Optional
          - identity_id: team-data
            identity_type: team
            display_name: Data Team

      # --- Cost types (at least 1 required) ---
      cost_types:
        # Memory: measure from redis_exporter, split evenly across teams
        - name: REDIS_MEMORY
          product_category: redis
          rate: "0.02"                      # USD per GiB-hour
          cost_quantity:
            type: storage_gib               # Queries Prometheus for average bytes → GiB-hours
            # Required (type=storage_gib) — cluster-wide PromQL; no {} placeholder
            query: "avg_over_time(redis_memory_used_bytes[1h]) / 1073741824"
          allocation_strategy: even_split   # Memory is shared infrastructure; split evenly

        # Compute: fixed instance cost, split evenly
        - name: REDIS_COMPUTE
          product_category: redis
          rate: "0.10"                      # USD per instance-hour
          cost_quantity:
            type: fixed
            count: 1                        # Single Redis instance (or sentinel primary)
          allocation_strategy: even_split

      # --- Orchestration ---
      chargeback_granularity: daily       # Optional — "hourly"/"daily"/"monthly"; default "daily"
      min_refresh_gap_seconds: 1800       # Optional — minimum seconds between runs; >=0; 0=no minimum
      metrics_step_seconds: 3600          # Optional — Prometheus step in seconds; >0; lower=finer data + higher load

      # Optional — allocator-specific numeric/string/bool params passed to all allocators.
      # Keys and semantics are allocator-defined.
      # allocator_params:
      #   memory_smoothing_window: 24       # hours — smooth memory usage over N hours before allocating
      #   exclude_zero_usage: true          # boolean param; interpretation is allocator-specific
      allocator_params: {}

      # Optional — override the allocator for specific product types.
      # Maps product_type (cost_types[].name) → Python dotted path to a CostAllocator callable.
      # Valid product types for this config: REDIS_MEMORY, REDIS_COMPUTE
      # allocator_overrides:
      #   REDIS_MEMORY: "my_org.allocators.KeyspaceWeightedAllocator"
      allocator_overrides: {}

      # Optional — override the identity resolver for a service type.
      # Maps service_type → Python dotted path to a resolver function.
      # Valid service_type for generic_metrics_only: "generic"
      # identity_resolution_overrides:
      #   generic: "my_org.resolvers.team_directory_resolver"
      identity_resolution_overrides: {}
