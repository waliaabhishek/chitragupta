# =============================================================================
# CCloud Minimal — Single Confluent Cloud organization, defaults everywhere.
# Who: First-time setup, evaluation, small teams.
# Requires env vars: CCLOUD_ORG_ID, CCLOUD_API_KEY, CCLOUD_API_SECRET
# =============================================================================

logging:
  level: ${LOG_LEVEL:-INFO}  # Optional — CRITICAL/ERROR/WARNING/INFO/DEBUG

features:
  enable_periodic_refresh: true   # Optional — poll on schedule vs. manual trigger only
  refresh_interval: 1800          # Optional — seconds between refresh cycles; >0
  max_parallel_tenants: 4         # Optional — concurrent tenant processing; 1-64

api:
  host: "0.0.0.0"   # Optional — bind address; use 127.0.0.1 to restrict to localhost
  port: 8080         # Optional — HTTP port; 1-65535

tenants:
  ccloud-prod:                     # Required — unique tenant key (used in logs/storage paths)
    ecosystem: confluent_cloud     # Required — plugin selector; must be "confluent_cloud"
    tenant_id: "${CCLOUD_ORG_ID}"  # Required — Confluent Cloud org ID (e.g., "org-abc123")
    lookback_days: 90              # Optional — historical backfill window; 1-364; must be > cutoff_days
    cutoff_days: 5                 # Optional — skip last N days for billing finalization lag; 1-30

    storage:
      backend: sqlmodel                                          # Optional — only "sqlmodel" supported
      connection_string: "sqlite:////app/data/ccloud-prod.db"   # Required — unique per tenant

    plugin_settings:
      ccloud_api:
        key: "${CCLOUD_API_KEY}"       # Required — CCloud API key (Cloud Console > API keys)
        secret: "${CCLOUD_API_SECRET}" # Required — CCloud API secret
