# =============================================================================
# CCloud Complete — All configuration options for Confluent Cloud.
# Who: Production operators wanting fine-grained control and usage-based allocation.
# Requires env vars: CCLOUD_ORG_ID, CCLOUD_API_KEY, CCLOUD_API_SECRET,
#                    PROMETHEUS_URL, PROM_USERNAME, PROM_PASSWORD
# =============================================================================

logging:
  level: ${LOG_LEVEL:-INFO}                                      # Optional — CRITICAL/ERROR/WARNING/INFO/DEBUG
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s" # Optional — Python logging format string
  per_module_levels:                                             # Optional — per-module level overrides
    httpx: WARNING
    urllib3: WARNING

features:
  enable_periodic_refresh: true   # Optional — run on interval; false = manual trigger only
  refresh_interval: 1800          # Optional — seconds between auto-runs; >0
  max_parallel_tenants: 4         # Optional — max tenants processed concurrently; 1-64

api:
  host: "0.0.0.0"               # Optional — bind address
  port: 8080                     # Optional — HTTP port; 1-65535
  enable_cors: false             # Optional — enable CORS headers (required for browser clients)
  cors_origins: []               # Optional — allowed origins when enable_cors=true
  request_timeout_seconds: 30    # Optional — per-request timeout; 1-300

tenants:
  ccloud-prod:
    ecosystem: confluent_cloud     # Required — must be "confluent_cloud"
    tenant_id: "${CCLOUD_TENANT_ID}"  # Required — unique partition key for DB records (any string, not the CCloud org ID)
    lookback_days: 90              # Optional — backfill window; 1-364; must be > cutoff_days
    cutoff_days: 5                 # Optional — billing finalization lag; 1-30
    retention_days: 250            # Optional — purge records older than N days; 1-730
    allocation_retry_limit: 3      # Optional — retry failed allocations per day; 1-10
    zero_gather_deletion_threshold: -1  # Optional — -1=disabled; N=delete resource after N zero-gather days
    gather_failure_threshold: 5    # Optional — mark resource failed after N consecutive gather errors
    tenant_execution_timeout_seconds: 3600  # Optional — hard timeout per tenant run in seconds; 0=disabled

    storage:
      backend: sqlmodel                                         # Optional — "sqlmodel" (SQLite or PostgreSQL URL)
      connection_string: "sqlite:////app/data/ccloud-prod.db"  # Required — unique per tenant across all tenants
      # PostgreSQL alternative (requires psycopg2 — see docs/operations/deployment.md):
      # connection_string: "postgresql+psycopg2://user:pass@host:5432/ccloud_prod"  # one database per tenant

    plugin_settings:
      # --- CCloud API credentials ---
      ccloud_api:
        key: "${CCLOUD_API_KEY}"       # Required — CCloud API key
        secret: "${CCLOUD_API_SECRET}" # Required — CCloud API secret

      # --- Billing API ---
      billing_api:
        days_per_query: 15  # Optional — billing API batch size in days; 1-30; default 15

      # --- Prometheus metrics (enables usage-based allocation) ---
      # Omit this section entirely if you want even-split allocation only.
      metrics:
        type: prometheus              # Optional — only "prometheus" supported
        url: "${PROMETHEUS_URL}"      # Required — Prometheus base URL
        auth_type: basic              # Optional — "none"/"basic"/"bearer"
        username: "${PROM_USERNAME}"  # Required when auth_type=basic
        password: "${PROM_PASSWORD}"  # Required when auth_type=basic

      # --- Plugin orchestration (from PluginSettingsBase) ---
      chargeback_granularity: daily   # Optional — "hourly"/"daily"/"monthly"; default "daily"
      min_refresh_gap_seconds: 1800   # Optional — minimum gap between runs; >=0; 0=no minimum
      metrics_step_seconds: 3600      # Optional — Prometheus step in seconds; >0; lower=finer data + higher load
      allocator_params: {}            # Optional — allocator-specific numeric/string/bool params
      allocator_overrides: {}         # Optional — product_type → allocator class name overrides
      identity_resolution_overrides: {}  # Optional — identity_id → resolved_id overrides

      # --- CSV emitter ---
      # Add emitters to export chargeback data after each run.
      emitters:
        - type: csv               # Required — registered emitter name; currently only "csv" available
          aggregation: daily      # Optional — null/"hourly"/"daily"/"monthly"; must be >= chargeback_granularity
          params:
            output_dir: "/app/data/csv"                      # Required for csv — output directory; created if missing
            filename_template: "{tenant_id}_{date}.csv"      # Optional — supports {tenant_id} and {date} tokens
