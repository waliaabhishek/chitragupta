logging:
  level: INFO

features:
  enable_periodic_refresh: true
  refresh_interval: 3600

api:
  host: "0.0.0.0"
  port: 8080

tenants:
  ccloud-prod:
    ecosystem: confluent_cloud
    tenant_id: "${CCLOUD_TENANT_ID}"  # unique partition key for DB records (any string, not the CCloud org ID)
    lookback_days: 90
    cutoff_days: 5
    storage:
      backend: sqlmodel
      connection_string: "sqlite:////app/data/chargeback.db"
    plugin_settings:
      ccloud_api:
        key: "${CCLOUD_API_KEY}"
        secret: "${CCLOUD_API_SECRET}"
