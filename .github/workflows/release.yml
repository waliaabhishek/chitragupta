name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  docker-backend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/chitragupta:${{ github.ref_name }}
            ${{ !contains(github.ref_name, '-') && format('ghcr.io/{0}/chitragupta:latest', github.repository_owner) || '' }}

  docker-frontend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chitragupta-ui:${{ github.ref_name }}
            ${{ !contains(github.ref_name, '-') && format('ghcr.io/{0}/chitragupta-ui:latest', github.repository_owner) || '' }}

  release:
    needs: [docker-backend, docker-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git-cliff needs full history

      - name: Create release branch
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          git checkout -b "release/${{ github.ref_name }}"
          git push origin "release/${{ github.ref_name }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync --frozen --group docs

      - name: Update changelog on main
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          uv run git-cliff --config cliff.toml --tag ${{ github.ref_name }} --output /tmp/CHANGELOG.md
          git checkout main
          cp /tmp/CHANGELOG.md CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "Docs: Update CHANGELOG for ${{ github.ref_name }}"
          git push origin main
          git checkout ${{ github.ref_name }}

      - name: Generate release notes
        run: |
          uv run git-cliff --config cliff.toml --latest --strip header --output release-notes.md
          printf '\n## Docker Images\n\n```bash\ndocker pull ghcr.io/${{ github.repository_owner }}/chitragupta:${{ github.ref_name }}\ndocker pull ghcr.io/${{ github.repository_owner }}/chitragupta-ui:${{ github.ref_name }}\n```\n\nPin in your `.env`:\n```\nCHITRAGUPTA_VERSION=${{ github.ref_name }}\n```\n\n## Compatibility\n\n- **Grafana**: 12.4.0\n- **Required plugin**: `frser-sqlite-datasource`\n' >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
