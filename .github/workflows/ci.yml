name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git-cliff integration test needs full history + tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Audit dependencies
        run: uv audit --frozen
        continue-on-error: true

      - name: Lint
        run: uv run ruff check

      - name: Type check
        run: uv run mypy src/

      - name: Test with coverage
        run: uv run pytest --cov=src --cov-fail-under=75
