name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    name: Backend quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git-cliff integration test needs full history + tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Audit dependencies
        run: uv audit --frozen
        continue-on-error: true

      - name: Lint
        run: uv run ruff check

      - name: Type check
        run: uv run mypy src/

      - name: Test with coverage
        run: uv run pytest --cov=src --cov-fail-under=75 --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test

      - name: Build
        run: npm run build

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [quality, frontend]
    if: always()
    steps:
      - name: Verify all upstream jobs succeeded
        run: |
          if [[ "${{ needs.quality.result }}" != "success" || "${{ needs.frontend.result }}" != "success" ]]; then
            echo "CI failed — quality=${{ needs.quality.result }}, frontend=${{ needs.frontend.result }}"
            exit 1
          fi
          echo "All CI jobs succeeded"
