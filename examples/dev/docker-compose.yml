# =============================================================================
# Dev — builds backend + frontend from source before starting.
#
# Usage:
#   docker compose up --build
#
# Copy .env from ccloud-full and adjust if needed:
#   cp ../ccloud-full/.env .env
#
# Identical to ccloud-full except images are built locally, not pulled from GHCR.
# =============================================================================

services:
  chitragupta:
    container_name: chitragupta
    build:
      context: ../../
      dockerfile: Dockerfile
    volumes:
      - ./config.yaml:/app/config/config.yaml:ro
      - chitragupta-data:/app/data:rw
    env_file:
      - .env
    command: ["--config-file", "/app/config/config.yaml", "--mode", "both"]
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  grafana:
    container_name: chitragupta-grafana
    image: grafana/grafana:12.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-password}
      GF_INSTALL_PLUGINS: frser-sqlite-datasource,marcusolsson-treemap-panel
    volumes:
      - ../shared/grafana/provisioning:/etc/grafana/provisioning:ro
      - chitragupta-data:/var/lib/grafana/data/chargeback:ro
    restart: unless-stopped
    depends_on:
      chitragupta:
        condition: service_healthy

  chitragupta-ui:
    container_name: chitragupta-ui
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    restart: unless-stopped
    depends_on:
      chitragupta:
        condition: service_healthy

volumes:
  chitragupta-data:
