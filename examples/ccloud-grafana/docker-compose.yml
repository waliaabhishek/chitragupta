services:
  chitragupt:
    # The chargeback engine image — built from the repo root Dockerfile.
    # Build context is two levels up because this file lives at examples/ccloud-grafana/.
    image: chitragupt:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    volumes:
      # Mount config read-only so the container cannot modify it.
      - ./config.yaml:/app/config/config.yaml:ro
      # Named volume shared with Grafana so it can read the SQLite database directly.
      - chitragupt-data:/app/data:rw
    env_file:
      # Populated from .env.example — copy to .env and fill in your credentials.
      - .env
    # Worker mode: runs the pipeline periodically but starts NO HTTP server.
    # Port 8080 is intentionally not exposed here.
    command: ["--config-file", "/app/config/config.yaml", "--mode", "worker"]
    restart: unless-stopped
    # No healthcheck: --mode worker starts no HTTP server so there is nothing to probe.

  grafana:
    # Grafana reads the SQLite database directly from the shared volume.
    # No HTTP dependency on chitragupt — it will show data once the first pipeline run completes.
    image: grafana/grafana:12.4.0
    ports:
      # Grafana UI — access at http://localhost:3000
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      # Admin password — override via GF_ADMIN_PASSWORD in .env, defaults to "password".
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-password}
      # The frser-sqlite-datasource plugin is required to read SQLite files.
      GF_INSTALL_PLUGINS: frser-sqlite-datasource
    volumes:
      # Pre-provisioned dashboards and datasource — shared across all examples.
      - ../shared/grafana/provisioning:/etc/grafana/provisioning:ro
      # Read-only access to the chargeback database written by chitragupt.
      # Path inside container must match the datasource.yml path: /var/lib/grafana/data/chargeback/chargeback.db
      - chitragupt-data:/var/lib/grafana/data/chargeback:ro
    restart: unless-stopped
    # No depends_on: Grafana reads SQLite directly and will show data once the DB is populated.
    # restart: unless-stopped handles reconnection automatically.

volumes:
  # Named volume shared between chitragupt (writes) and grafana (reads).
  # Docker manages the lifecycle — data persists across container restarts.
  chitragupt-data:
