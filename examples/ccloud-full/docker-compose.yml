services:
  chitragupta:
    # The chargeback engine — pulled from GHCR.
    container_name: chitragupta
    image: ghcr.io/waliaabhishek/chitragupta:${CHITRAGUPTA_VERSION:-latest}
    volumes:
      # Mount config read-only so the container cannot modify it.
      - ./config.yaml:/app/config/config.yaml:ro
      # Named volume shared with Grafana so it can read the SQLite database directly.
      - chitragupta-data:/app/data:rw
    env_file:
      # Populated from .env.example — copy to .env and fill in your credentials.
      - .env
    # Both mode: runs the REST API server (port 8080) AND the periodic pipeline worker.
    command: ["--config-file", "/app/config/config.yaml", "--mode", "both"]
    ports:
      # REST API — access at http://localhost:8080
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      # Probe the /health endpoint. Grafana and UI wait for this to pass before starting.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  grafana:
    # Grafana reads the SQLite database directly from the shared volume.
    container_name: chitragupta-grafana
    image: grafana/grafana:12.4.0
    ports:
      # Grafana UI — access at http://localhost:3000
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      # Admin password — override via GF_ADMIN_PASSWORD in .env, defaults to "password".
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-password}
      # The frser-sqlite-datasource plugin is required to read SQLite files.
      # The marcusolsson-treemap-panel plugin is used by the Cost breakdown by Principal panel.
      GF_INSTALL_PLUGINS: frser-sqlite-datasource,marcusolsson-treemap-panel
    volumes:
      # Pre-provisioned dashboards and datasource — shared across all examples.
      - ../shared/grafana/provisioning:/etc/grafana/provisioning:ro
      # Read-only access to the chargeback database written by chitragupta.
      # Path inside container must match the datasource.yml path: /var/lib/grafana/data/chargeback/chargeback.db
      - chitragupta-data:/var/lib/grafana/data/chargeback:ro
    restart: unless-stopped
    depends_on:
      chitragupta:
        # Wait for chitragupta's healthcheck to pass before starting Grafana.
        condition: service_healthy

  chitragupta-ui:
    # The React frontend served by nginx — pulled from GHCR.
    container_name: chitragupta-ui
    image: ghcr.io/waliaabhishek/chitragupta-ui:${CHITRAGUPTA_VERSION:-latest}
    ports:
      # Frontend UI — access at http://localhost:8081
      - "8081:80"
    restart: unless-stopped
    depends_on:
      chitragupta:
        # Wait for chitragupta's healthcheck to pass — UI proxies API calls to it.
        condition: service_healthy

volumes:
  # Named volume shared between chitragupta (writes) and grafana (reads).
  # Docker manages the lifecycle — data persists across container restarts.
  chitragupta-data:
